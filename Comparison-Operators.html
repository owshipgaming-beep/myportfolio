<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>

</head>
<body>

	<h1 id="h1">PLACE HOLDER<h1>

<script>

	age = Number(prompt ("What is your age?"));
	
	
	if(age >= 18) {
		
		document.getElementById("h1").textContent = "You are an adult"
		
	}
	if(age < 18) {
		
		document.getElementById("h1").textContent = "You are a minor"
		
	}


</script>
</body>
</html>
