<!DOCTYPE html>
<html>
<head>
<title>CSS Flexbox</title>
<style>
.names {
    display: flex;
    background-color: #E37383;
    flex-direction: row;
    flex-wrap: wrap;
}

.names div {
    background-color: lightpink;
    margin: 10px;
    padding: 20px;
    font-size: 24px;
    width: 100px;
    text-align: center;
}
</style>
</head>
<body>
<h1>CSS Flexbox</h1>
<div class="names">
    <div>ALEX</div>
    <div>JAIME</div>
    <div>KING</div>
    <div>KARL</div>
    <div>TOBI</div>
</div>
</body>
</html>
