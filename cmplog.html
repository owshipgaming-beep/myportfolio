<!DOCTYPE html>
<html>
<head>
    <title>Comparison and Logical Operators</title>
</head>
<body>

    <p id="ans1"></p>
    <p id="ans2"></p>
    <p id="ans3"></p>

<script>

    // Comparison 1
    let a = 2, b = 3;
    let ans1 = a <= b;

    document.getElementById("ans1").innerHTML = ans1;

    // Comparison 2 (string comparison)
    let c = "15";
    let d = "5";
    let ans2 = c < d;

    document.getElementById("ans2").innerHTML = ans2;

    // Logical NOT example
    let e = 2, f = 5;
    let ans3 = !(a <= b);

    document.getElementById("ans3").innerHTML = ans3;

</script>

</body>
</html>
