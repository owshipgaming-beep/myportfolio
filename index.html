<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Anywhere App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%230f3460;stop-opacity:0.3" /><stop offset="100%" style="stop-color:%2316213e;stop-opacity:0.1" /></linearGradient></defs><circle cx="400" cy="400" r="300" fill="url(%23grad)"/><circle cx="600" cy="200" r="150" fill="url(%23grad)"/></svg>');
            background-size: cover;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffffff;
        }

        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 150px);
        }

        .card {
            background: rgba(30, 30, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .subtext {
            color: #a0a0a0;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .subtext a {
            color: #4a9eff;
            text-decoration: none;
        }

        .subtext a:hover {
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            display: block;
            color: #c0c0c0;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4a9eff;
            background: rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: #4a9eff;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #3a8eef;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 158, 255, 0.4);
        }

        @media (max-width: 768px) {
            .card {
                padding: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Anywhere app</div>
            <nav>
                <a href="#">Home</a>
                <a href="#">Join</a>
            </nav>
        </header>

        <div class="signup-container">
            <div class="card">
                <h1>Create new account.</h1>
                <p class="subtext">Already a Member? <a href="#">Log in</a></p>

                <form id="signupForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="Michael">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Moser">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="michael.moser@anywhere.co">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••">
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-secondary">Change method</button>
                        <button onlcick="gotosum()" class="btn-primary">Create account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let emailValue;
        let passwordValue;

        document.getElementById("signupForm").addEventListener("submit", function(e) {
            e.preventDefault();

            emailValue = document.getElementById("email").value;
            passwordValue = document.getElementById("password").value;

            if (emailValue === "Game@html.html" && passwordValue === "password") {
                window.location.href = "doom_game_enhanced.html";
            }
            else if (emailValue = "Emailko@gmail.com" && passwordValue = "password") {
                window.location.href = "homepage.html";
            }
            else {
                alert("Please enter email and password");
            }

            function gotosum() {

                            if (emailValue === "Game@html.html" && passwordValue === "password") {
                window.location.href = "doom_game_enhanced.html";
            }
            else if (emailValue = "Emailko@gmail.com" && passwordValue = "password") {
                window.location.href = "homepage.html";
            }
            else {
                alert("Please enter email and password");
            }
                
            }
        });
    </script>
</body>
</html>
