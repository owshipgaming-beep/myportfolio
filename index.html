<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Anywhere App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            right: 0; top: 0;
            width: 50%; height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%230f3460;stop-opacity:0.3" /><stop offset="100%" style="stop-color:%2316213e;stop-opacity:0.1" /></linearGradient></defs><circle cx="400" cy="400" r="300" fill="url(%23grad)"/><circle cx="600" cy="200" r="150" fill="url(%23grad)"/></svg>');
            background-size: cover;
            opacity: 0.3;
        }
        .container { position: relative; z-index: 1; width: 100%; max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .logo { font-size: 1.5rem; font-weight: 600; color: #ffffff; }
        nav { display: flex; gap: 2rem; }
        nav a { color: #a0a0a0; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        nav a:hover { color: #ffffff; }
        .login-container { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 150px); }
        .card {
            background: rgba(30, 30, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #ffffff; font-size: 2rem; margin-bottom: 0.5rem; font-weight: 600; }
        .subtext { color: #a0a0a0; margin-bottom: 2rem; font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: #c0c0c0; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            width: 100%; padding: 0.875rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: #ffffff; font-size: 0.95rem; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #4a9eff; background: rgba(255,255,255,0.08); }
        input::placeholder { color: #666; }
        .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 1rem; text-align: center; min-height: 1.2em; opacity: 0; transition: opacity 0.3s; }
        .error-msg.visible { opacity: 1; }
        .button-group { display: flex; margin-top: 2rem; }
        button { flex: 1; padding: 0.875rem 1.5rem; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #4a9eff; color: #ffffff; }
        .btn-primary:hover { background: #3a8eef; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,158,255,0.4); }
        @media (max-width: 768px) { .card { padding: 2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Anywhere app</div>
            <nav>
                <a href="#">Home</a>
                <a href="#">Join</a>
            </nav>
        </header>
        <div class="login-container">
            <div class="card">
                <h1>Welcome back.</h1>
                <p class="subtext">Enter your credentials to continue.</p>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <p class="error-msg" id="errorMsg">Incorrect email or password.</p>
                <div class="button-group">
                    <button class="btn-primary" onclick="handleLogin()">Log in</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        function handleLogin() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            if (email === "Emailko@gmail.com" && password === "password") {
                window.location.href = "homepage.html";
            } else if (email === "Game@gmail.com" && password === "password") {
                window.location.href = "doom_game_enhanced.html";
            } else {
                errorMsg.classList.add("visible");
            }
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter") handleLogin();
        });

        document.getElementById("email").addEventListener("input", () => {
            document.getElementById("errorMsg").classList.remove("visible");
        });
        document.getElementById("password").addEventListener("input", () => {
            document.getElementById("errorMsg").classList.remove("visible");
        });
    </script>
</body>
</html>
