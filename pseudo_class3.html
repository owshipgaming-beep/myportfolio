<!DOCTYPE html>
<html>
<head>
    <title>CSS Pseudo-Classes 3</title>
    <style>
        p {
            display: none;
            background-color: yellow;
            padding: 20px;
            margin: 0;
        }

        div:hover p {
            display: block;
        }

        div {
            width: 200px;
            height: 100px;
            background-color: #4a90e2;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div>
        Hover over me
        <p>Hypertext Markup Language</p>
    </div>
</body>
</html>
